<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice2</title>
</head>
<body>
    <h1>JavaScript Switch Statement</h1>

    <script>
        let team = "blue";

        switch (team){
            case "green":
                alert("Go Green Hornets!");
                break;

            case "red":
                alert("Go Red Bulldogs!");
                break;
            
            case "blue":
                alert("Go Blue Bears!");
                break;

            case "yellow":
                alert("Go Yellow Tigers!");
                break;
        }
    </script>

</body>
</html>
