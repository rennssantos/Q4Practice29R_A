<body>
    <h1>JavaScript Switch Statement</h1>

    <form>
        <label for="songs">Enter any SB19 song title:</label>
        <input type="text" name="songs" id="songs" placeholder="Type here..." class="form-control" >
        <button type="submit" id="btn_song" class="btn btn-success"  onclick="checkSong()">Search</button>
    </form>

    <script>
        function checkSong(){
            var song1 = document.getElementById("songs").value;
            

            switch (true){        
                case (song1 === "Bazinga"):
                    alert("That's a good song.");
                    break;
                case (song1 === "Mapa"):
                    alert("Is that your favorite song?");
                    break;
                case (song1 === "Dungka"):
                    alert("That's their latest hit.");
                    break;
                default:
                    alert("Song not available.");         
            }
        }
